# Render.com Blueprint - deploy the translator web app straight from GitHub.
# On render.com: New -> Blueprint -> pick this repo -> Apply. Free plan, no card.
services:
  - type: web
    name: pdf-en-ja-translator
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Optional: set a Gemini key here to enable the free-tier LLM engine for
      # everyone, or leave unset and paste the key per-job in the web UI.
      - key: GEMINI_API_KEY
        sync: false
      # "Only me" mode: set this to a PASSWORD to lock the whole site. The
      # browser shows a login prompt (enter any username + this password).
      # Leave empty to let anyone with the URL use it.
      - key: PDF_TRANSLATOR_TOKEN
        sync: false
      # Optional Supabase Storage backend: keeps translated PDFs even across
      # REDEPLOYS (Render's free disk is wiped on each deploy). Set URL + KEY
      # from your Supabase project (Settings -> API -> service_role key). Leave
      # unset = local disk only. Free tier gives 1 GB. See docs/DEPLOY.md.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: translations
