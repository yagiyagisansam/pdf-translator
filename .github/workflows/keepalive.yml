name: Keep app awake

# Pings the deployed app's /healthz every ~10 minutes so the free Render
# instance does not spin down (which otherwise delays the first request ~50s).
# Change APP_URL below if your Render URL differs. You can also set a repo
# variable APP_URL (Settings → Secrets and variables → Actions → Variables) to
# override it without editing this file.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        env:
          APP_URL: ${{ vars.APP_URL || 'https://pdf-en-ja-translator.onrender.com' }}
        run: |
          echo "Pinging $APP_URL/healthz"
          curl -fsS --retry 3 --retry-delay 20 --max-time 90 "$APP_URL/healthz" || \
            echo "ping failed (instance may be waking); will try again next run"
